<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulatore Vice Ispettori PS 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --surface: #141417; --surface2: #1c1c21; --border: #2a2a32;
    --accent: #e8413e; --accent2: #f5a623; --green: #27c97a; --red: #e8413e;
    --text: #f0f0f5; --muted: #6b6b7a;
    --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
  
  #loader, #quiz, #results { padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  #quiz, #results { display: none; }

  .load-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 30px; width: min(600px, 95vw); gap: 20px; display: flex; flex-direction: column; z-index: 10; }
  .mode-select, .grid-select { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
  
  .btn { border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: 0.2s; font-family: var(--font-display); letter-spacing: 1px; color: var(--text); background: var(--surface2); text-align: center; }
  .btn:hover { border-color: var(--accent); }
  .btn.active { border-color: var(--accent); background: rgba(232,65,62,0.12); color: var(--accent); }
  .start-btn { background: var(--accent); color: white; font-size: 24px; border: none; margin-top: 10px; width: 100%; }
  .start-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .topbar { position: fixed; top: 0; width: 100%; background: rgba(20,20,23,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
  .timer { font-family: var(--font-mono); color: var(--accent2); font-size: 20px; font-weight: bold; }
  
  .quiz-container { max-width: 800px; width: 100%; margin-top: 100px; padding-bottom: 100px; }
  .option { background: var(--surface); border: 1px solid var(--border); padding: 16px; margin: 10px 0; border-radius: 12px; cursor: pointer; text-align: left; width: 100%; color: var(--text); font-size: 16px; display: flex; gap: 15px; transition: transform 0.1s; }
  .option:hover:not(:disabled) { transform: translateX(5px); border-color: var(--muted); }
  .correct { border-color: var(--green) !important; background: rgba(39, 201, 122, 0.15) !important; }
  .wrong { border-color: var(--red) !important; background: rgba(232, 65, 62, 0.15) !important; }
  
  .q-cat { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent2); margin-bottom: 8px; display: block; }
  .next-btn { background: var(--accent); color: white; padding: 15px 40px; border-radius: 10px; cursor: pointer; margin-top: 20px; font-family: var(--font-display); font-size: 20px; border: none; display: none; width: 100%; }
  
  .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; margin: 10px 0; }
  .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>

<div id="loader">
  <div class="load-box">
    <h1 style="font-family: var(--font-display); font-size: 42px; text-align: center; letter-spacing: 2px;">QUIZ <span style="color:var(--accent)">VP 2026</span></h1>
    
    <div id="fileSection">
      <p style="color:var(--muted); font-size: 13px; margin-bottom: 8px; text-transform: uppercase;">1. Carica Banca Dati (.json)</p>
      <input type="file" id="fileInput" accept=".json" style="background: var(--surface2); padding: 10px; border-radius: 8px; width: 100%; border: 1px dashed var(--border);">
    </div>

    <div class="divider">2. MODALITÀ</div>
    <div class="mode-select">
      <button class="btn active" data-mode="practice">ESERCITAZIONE</button>
      <button class="btn" data-mode="exam">SIMULAZIONE ESAME</button>
    </div>

    <div id="setupPractice">
      <div class="divider">3. FILTRI ESERCITAZIONE</div>
      <p style="color:var(--muted); font-size: 12px; margin-bottom: 6px;">MATERIA:</p>
      <div class="grid-select" id="catFilter">
        <button class="btn active" data-cat="all">Tutte</button>
        <button class="btn" data-cat="Diritto Costituzionale">Cost.</button>
        <button class="btn" data-cat="Diritto Penale">Penale</button>
        <button class="btn" data-cat="Diritto Processuale Penale">Proc. Pen.</button>
        <button class="btn" data-cat="repeat" id="btnRepeat" style="display:none; color: var(--accent2); border-color: var(--accent2);">ERRORI (<span id="countRepeat">0</span>)</button>
      </div>

      <p style="color:var(--muted); font-size: 12px; margin: 15px 0 6px;">NUMERO DOMANDE:</p>
      <div class="grid-select" id="numFilter">
        <button class="btn active" data-n="20">20</button>
        <button class="btn" data-n="50">50</button>
        <button class="btn" data-n="100">100</button>
        <button class="btn" data-n="all">TUTTE</button>
      </div>
    </div>

    <button class="btn start-btn" id="startBtn" disabled>INIZIA SESSIONE</button>
  </div>
</div>

<div id="quiz">
  <div class="topbar">
    <div id="progress" style="font-size: 14px; color: var(--muted);">Domanda 1 / --</div>
    <div class="timer" id="timer">90:00</div>
    <div id="liveScore" style="font-family: var(--font-mono); font-size: 14px; color: var(--green);">Punti: 0.00</div>
  </div>

  <div class="quiz-container">
    <span class="q-cat" id="displayCat">--</span>
    <h2 id="questionText" style="font-size: 22px; margin-bottom: 30px; font-weight: 400; line-height: 1.5;"></h2>
    <div id="options"></div>
    <button class="next-btn" id="nextBtn">CONFERMA E CONTINUA →</button>
  </div>
</div>

<div id="results">
  <div class="load-box" style="text-align: center; border-color: var(--accent);">
    <h1 id="resTitle" style="font-family: var(--font-display); font-size: 80px; margin-bottom: 0;">0.00</h1>
    <p id="resSub" style="letter-spacing: 3px; color: var(--muted); margin-bottom: 30px;">PUNTEGGIO FINALE</p>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px;">
      <div class="btn" style="cursor: default;">CORRETTE<br><span id="resC" style="color:var(--green); font-size: 20px;">0</span></div>
      <div class="btn" style="cursor: default;">ERRATE<br><span id="resW" style="color:var(--red); font-size: 20px;">0</span></div>
      <div class="btn" style="cursor: default;">SALTATE<br><span id="resS" style="font-size: 20px;">0</span></div>
    </div>
    
    <button class="btn start-btn" onclick="location.reload()">TORNA ALLA HOME</button>
  </div>
</div>

<script>
  let allQuestions = [];
  let sessionPool = [];
  let currentIdx = 0;
  let score = 0;
  let correctCount = 0;
  let wrongCount = 0;
  
  let selectedMode = 'practice';
  let selectedCat = 'all';
  let selectedN = '20';
  
  let timeLeft = 90 * 60;
  let timerId = null;
  let answered = false;

  const repeatKey = 'vp2026_errors';

  // 1. Caricamento file
  document.getElementById('fileInput').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        allQuestions = JSON.parse(ev.target.result);
        document.getElementById('startBtn').disabled = false;
        updateRepeatUI();
      } catch (err) { alert("Errore nel formato del file JSON"); }
    };
    reader.readAsText(e.target.files[0]);
  };

  // 2. Gestione Selezioni UI
  function setupButtons(containerId, stateVarSetter) {
    document.querySelectorAll(`#${containerId} .btn`).forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(`#${containerId} .btn`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        stateVarSetter(btn.dataset.mode || btn.dataset.cat || btn.dataset.n);
      };
    });
  }

  setupButtons('loader', (val) => {
    selectedMode = val;
    document.getElementById('setupPractice').style.display = (val === 'practice') ? 'block' : 'none';
  });
  setupButtons('catFilter', (val) => selectedCat = val);
  setupButtons('numFilter', (val) => selectedN = val);

  function updateRepeatUI() {
    const errors = JSON.parse(localStorage.getItem(repeatKey) || '[]');
    document.getElementById('countRepeat').textContent = errors.length;
    document.getElementById('btnRepeat').style.display = errors.length > 0 ? 'block' : 'none';
  }

  // 3. Logica di Inizio Sessione
  document.getElementById('startBtn').onclick = () => {
    if (selectedMode === 'exam') {
      // Regole Simulazione: 20 Cost, 40 Pen, 40 Proc Pen
      const cost = shuffle(allQuestions.filter(q => q.cat === "Diritto Costituzionale")).slice(0, 20);
      const pen = shuffle(allQuestions.filter(q => q.cat === "Diritto Penale")).slice(0, 40);
      const proc = shuffle(allQuestions.filter(q => q.cat === "Diritto Processuale Penale")).slice(0, 40);
      sessionPool = shuffle([...cost, ...pen, ...proc]);
      startTimer();
    } else {
      // Esercitazione Libera
      let pool = [];
      if (selectedCat === 'repeat') {
        const errorIds = JSON.parse(localStorage.getItem(repeatKey) || '[]');
        pool = allQuestions.filter(q => errorIds.includes(q.num));
      } else {
        pool = (selectedCat === 'all') ? allQuestions : allQuestions.filter(q => q.cat === selectedCat);
      }
      
      sessionPool = shuffle(pool);
      if (selectedN !== 'all') {
        sessionPool = sessionPool.slice(0, parseInt(selectedN));
      }
      document.getElementById('timer').style.display = 'none';
    }
    
    document.getElementById('loader').style.display = 'none';
    document.getElementById('quiz').style.display = 'flex';
    renderQuestion();
  };

  function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

  function renderQuestion() {
    answered = false;
    const q = sessionPool[currentIdx];
    document.getElementById('progress').textContent = `Domanda ${currentIdx + 1} / ${sessionPool.length}`;
    document.getElementById('displayCat').textContent = q.cat;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('nextBtn').style.display = 'none';
    
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = '';
    
    // Le opzioni partono dalla risposta A (sempre corretta nel DB)
    const answers = [
      { text: q.a.A, correct: true },
      { text: q.a.B, correct: false },
      { text: q.a.C, correct: false },
      { text: q.a.D, correct: false },
      { text: q.a.E, correct: false }
    ];
    
    shuffle(answers).forEach(ans => {
      const b = document.createElement('button');
      b.className = 'option';
      b.innerHTML = `<span>•</span> ${ans.text}`;
      b.onclick = () => checkAnswer(ans.correct, b);
      optsDiv.appendChild(b);
    });
  }

  function checkAnswer(isCorrect, element) {
    if (answered) return;
    answered = true;
    const q = sessionPool[currentIdx];

    if (isCorrect) {
      element.classList.add('correct');
      score += 0.3;
      correctCount++;
      removeError(q.num);
    } else {
      element.classList.add('wrong');
      score -= 0.1;
      wrongCount++;
      addError(q.num);
      // Evidenzia la corretta
      Array.from(document.querySelectorAll('.option')).forEach(opt => {
        if (opt.textContent.includes(q.a.A)) opt.classList.add('correct');
      });
    }

    document.getElementById('liveScore').textContent = `Punti: ${score.toFixed(2)}`;
    
    if (selectedMode === 'practice') {
      document.getElementById('nextBtn').style.display = 'block';
    } else {
      setTimeout(nextStep, 800); // Avanzamento rapido in esame
    }
  }

  function addError(num) {
    let errors = JSON.parse(localStorage.getItem(repeatKey) || '[]');
    if (!errors.includes(num)) {
      errors.push(num);
      localStorage.setItem(repeatKey, JSON.stringify(errors));
    }
  }

  function removeError(num) {
    let errors = JSON.parse(localStorage.getItem(repeatKey) || '[]');
    errors = errors.filter(n => n !== num);
    localStorage.setItem(repeatKey, JSON.stringify(errors));
  }

  document.getElementById('nextBtn').onclick = nextStep;

  function nextStep() {
    currentIdx++;
    if (currentIdx < sessionPool.length) {
      renderQuestion();
      window.scrollTo(0, 0);
    } else {
      finishQuiz();
    }
  }

  function startTimer() {
    timerId = setInterval(() => {
      timeLeft--;
      let m = Math.floor(timeLeft / 60);
      let s = timeLeft % 60;
      document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
      if (timeLeft <= 0) finishQuiz();
    }, 1000);
  }

  function finishQuiz() {
    clearInterval(timerId);
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('results').style.display = 'flex';
    
    document.getElementById('resTitle').textContent = score.toFixed(2);
    document.getElementById('resC').textContent = correctCount;
    document.getElementById('resW').textContent = wrongCount;
    document.getElementById('resS').textContent = sessionPool.length - (correctCount + wrongCount);
    
    if (selectedMode === 'exam') {
      document.getElementById('resSub').textContent = score >= 18 ? "IDONEO (SIMULAZIONE)" : "NON IDONEO";
      document.getElementById('resTitle').style.color = score >= 18 ? 'var(--green)' : 'var(--red)';
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz VP 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f; --surface: #141417; --border: #2a2a32;
            --accent: #e8413e; --green: #27c97a; --text: #f0f0f5;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'DM Sans', sans-serif; margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        /* Layout Mobile */
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 20px; }
        
        .btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: #1c1c21; border: 1px solid var(--border);
            color: white; border-radius: 8px; font-family: 'Bebas Neue';
            font-size: 1.2rem; cursor: pointer; text-align: center;
        }
        .btn.active { border-color: var(--accent); background: rgba(232, 65, 62, 0.1); }
        .start-btn { background: var(--accent); border: none; font-size: 1.5rem; }

        /* Quiz UI */
        .option { 
            background: #1c1c21; border: 1px solid var(--border); 
            padding: 15px; margin: 8px 0; border-radius: 10px; font-size: 0.95rem;
            width: 100%; text-align: left; color: var(--text);
        }
        .correct { border-color: var(--green) !important; background: rgba(39, 201, 122, 0.1) !important; }
        .wrong { border-color: var(--accent) !important; background: rgba(232, 65, 62, 0.1) !important; }
        
        .timer { color: #f5a623; font-weight: bold; text-align: center; font-size: 1.2rem; }
        #loader, #quiz { display: none; }
        #loader.active, #quiz.active { display: block; }
    </style>
</head>
<body>

<div id="loader" class="container active">
    <div class="card">
        <h1 style="font-family: 'Bebas Neue'; text-align:center; font-size:3rem; margin:0;">QUIZ <span style="color:var(--accent)">VP 2026</span></h1>
        <p style="text-align:center; color:#6b6b7a">Banca dati 5000 quesiti</p>
        
        <div style="margin:20px 0">
            <label>1. Carica Banca Dati (.json)</label>
            <input type="file" id="fileInput" accept=".json" class="btn">
        </div>

        <div id="menu">
            <label>2. Modalità</label>
            <div style="display:flex; gap:10px">
                <button class="btn active" id="modeP">Esercizio</button>
                <button class="btn" id="modeE">Esame</button>
            </div>
            
            <label>3. Numero Domande</label>
            <select id="numQ" class="btn">
                <option value="20">20 Domande</option>
                <option value="50">50 Domande</option>
                <option value="100">100 Domande</option>
            </select>
        </div>

        <button class="btn start-btn" id="startBtn" disabled>INIZIA ORA</button>
    </div>
</div>

<div id="quiz" class="container">
    <div class="timer" id="timerDisplay"></div>
    <div id="qArea">
        <p id="qCat" style="color:var(--accent); font-size:0.8rem; letter-spacing:1px;"></p>
        <h3 id="qText"></h3>
        <div id="optionsArea"></div>
    </div>
    <button class="btn" id="nextBtn" style="display:none; background:var(--accent)">PROSSIMA DOMANDA</button>
</div>

<script>
    let db = [];
    let session = [];
    let current = 0;
    let mode = 'practice';
    let timer;

    // Caricamento File
    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            db = JSON.parse(f.target.result);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "PRONTO! CLICCA QUI";
        };
        reader.readAsText(e.target.files[0]);
    };

    // Selezione Modalità
    document.getElementById('modeP').onclick = () => { mode='practice'; document.getElementById('modeP').classList.add('active'); document.getElementById('modeE').classList.remove('active'); };
    document.getElementById('modeE').onclick = () => { mode='exam'; document.getElementById('modeE').classList.add('active'); document.getElementById('modeP').classList.remove('active'); };

    // Start
    document.getElementById('startBtn').onclick = () => {
        const n = parseInt(document.getElementById('numQ').value);
        session = db.sort(() => 0.5 - Math.random()).slice(0, n);
        document.getElementById('loader').classList.remove('active');
        document.getElementById('quiz').classList.add('active');
        showQ();
    };

    function showQ() {
        const q = session[current];
        document.getElementById('qCat').innerText = q.cat + " (" + (current+1) + "/" + session.length + ")";
        document.getElementById('qText').innerText = q.q;
        document.getElementById('nextBtn').style.display = 'none';
        
        const optsArea = document.getElementById('optionsArea');
        optsArea.innerHTML = '';

        // Mescola opzioni
        const choices = [
            {t: q.a.A, c: true}, {t: q.a.B, c: false}, {t: q.a.C, c: false}, 
            {t: q.a.D, c: false}, {t: q.a.E, c: false}
        ].sort(() => 0.5 - Math.random());

        choices.forEach(choice => {
            const b = document.createElement('button');
            b.className = 'option';
            b.innerText = choice.t;
            b.onclick = () => {
                if(document.querySelector('.correct')) return; // evita doppi click
                if(choice.c) {
                    b.classList.add('correct');
                } else {
                    b.classList.add('wrong');
                    // mostra la corretta
                    Array.from(document.querySelectorAll('.option')).forEach(btn => {
                        if(btn.innerText === q.a.A) btn.classList.add('correct');
                    });
                }
                document.getElementById('nextBtn').style.display = 'block';
            };
            optsArea.appendChild(b);
        });
    }

    document.getElementById('nextBtn').onclick = () => {
        current++;
        if(current < session.length) showQ();
        else alert("Sessione finita!");
    };
</script>
</body>
</html>
